<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0;padding:0;font-family:Microsoft JhengHei;background:#ffffff;">

<div style="width:100%;padding:0;margin:0;box-sizing:border-box;">

  <input id="h" type="number" placeholder="身高 cm"
  style="width:100%;height:44px;padding:0 12px;margin:0 0 6px 0;border:1px solid #d1d5db;border-radius:10px;box-sizing:border-box;">

  <input id="w" type="number" placeholder="體重 kg"
  style="width:100%;height:44px;padding:0 12px;margin:0 0 6px 0;border:1px solid #d1d5db;border-radius:10px;box-sizing:border-box;">

  <select id="fit"
  style="width:100%;height:44px;padding:0 12px;margin:0 0 6px 0;border:1px solid #d1d5db;border-radius:10px;background:#fff;box-sizing:border-box;">
    <option value="官方建議" selected>官方建議</option>
    <option value="合身">合身</option>
    <option value="寬鬆">寬鬆</option>
  </select>

  <button onclick="calc()"
  style="width:100%;height:44px;background:#4b5563;color:#fff;border:none;border-radius:10px;font-weight:bold;">
    查看尺寸
  </button>

  <div id="result"
  style="margin-top:6px;font-size:16px;font-weight:bold;text-align:center;color:#111;">
  </div>

</div>

<script>
function calc(){
  var h = Number(document.getElementById("h").value);
  var w = Number(document.getElementById("w").value);
  var fit = document.getElementById("fit").value;

  if(!h || !w){
    alert("請輸入完整資料");
    return;
  }

  var size = "M";

  if(w > 60) size = "L";
  if(w > 75) size = "XL";
  if(w > 90) size = "2XL";

  if(fit === "寬鬆"){
    if(size === "M") size = "L";
    else if(size === "L") size = "XL";
    else if(size === "XL") size = "2XL";
  }

  if(fit === "合身"){
    if(size === "L") size = "M";
    else if(size === "XL") size = "L";
    else if(size === "2XL") size = "XL";
  }

  document.getElementById("result").innerHTML = "建議尺寸：" + size;
}
</script>

</body>
</html>
