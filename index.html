<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>尺寸計算</title>
</head>

<body style="margin:0;font-family:Microsoft JhengHei;background:#ffffff;">

<div style="max-width:420px;margin:auto;padding:16px;">

  <!-- 身高 -->
  <input id="h" type="number" placeholder="身高 cm"
  style="width:100%;padding:12px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;">

  <!-- 體重 -->
  <input id="w" type="number" placeholder="體重 kg"
  style="width:100%;padding:12px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;">

  <!-- 按鈕 -->
  <button onclick="calc()"
  style="width:100%;padding:12px;background:#444;color:#fff;border:none;border-radius:8px;">
  查看尺寸
  </button>

  <!-- 結果 -->
  <div id="result" style="margin-top:12px;font-weight:bold;text-align:center;"></div>

</div>

<script>
function calc(){
  var h = document.getElementById("h").value;
  var w = document.getElementById("w").value;

  if(!h || !w){
    alert("請輸入身高體重");
    return;
  }

  var size = "M";

  if(w > 60) size = "L";
  if(w > 75) size = "XL";
  if(w > 90) size = "2XL";

  document.getElementById("result").innerHTML = "建議尺寸：" + size;
}
</script>

</body>
</html>
