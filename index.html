<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0;padding:0;font-family:Microsoft JhengHei;background:#ffffff;">

<div id="wrap" style="display:flex;gap:8px;align-items:stretch;">

  <!-- 左邊輸入 -->
  <div style="flex:1;">

    <input id="h" type="number" value="170" placeholder="身高 cm"
    oninput="calc()"
    style="width:100%;height:42px;padding:0 12px;margin:0 0 6px 0;border:1px solid #d1d5db;border-radius:10px;box-sizing:border-box;">

    <input id="w" type="number" value="65" placeholder="體重 kg"
    oninput="calc()"
    style="width:100%;height:42px;padding:0 12px;margin:0 0 6px 0;border:1px solid #d1d5db;border-radius:10px;box-sizing:border-box;">

    <select id="fit" onchange="calc()"
    style="width:100%;height:42px;padding:0 12px;border:1px solid #d1d5db;border-radius:10px;background:#fff;box-sizing:border-box;">
      <option value="官方建議" selected>官方建議</option>
      <option value="合身">合身</option>
      <option value="寬鬆">寬鬆</option>
    </select>

  </div>

  <!-- 右邊結果 -->
  <div style="width:100px;background:#f3f4f6;border-radius:10px;display:flex;flex-direction:column;justify-content:center;align-items:center;">

    <div style="font-size:12px;color:#666;margin-bottom:4px;">
      尺寸
    </div>

    <div id="result"
    style="font-size:22px;font-weight:bold;color:#111;">
      M
    </div>

  </div>

</div>

<script>
function calc(){
  var h = Number(document.getElementById("h").value);
  var w = Number(document.getElementById("w").value);
  var fit = document.getElementById("fit").value;

  if(!h || !w){
    document.getElementById("result").innerHTML = "--";
    return;
  }

  var size = "M";

  if(w > 60) size = "L";
  if(w > 75) size = "XL";
  if(w > 90) size = "2XL";

  if(fit === "寬鬆"){
    if(size === "M") size = "L";
    else if(size === "L") size = "XL";
    else if(size === "XL") size = "2XL";
  }

  if(fit === "合身"){
    if(size === "L") size = "M";
    else if(size === "XL") size = "L";
    else if(size === "2XL") size = "XL";
  }

  document.getElementById("result").innerHTML = size;
}

// 預設一進來就算
calc();
</script>

</body>
</html>
